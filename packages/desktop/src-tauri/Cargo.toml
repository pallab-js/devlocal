[package]
name = "devopslocal"
version = "0.2.0"
description = "DevOpsLocal — local-first DevOps desktop suite"
authors = ["DevOpsLocal Contributors"]
edition = "2021"

[lib]
name = "devopslocal_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-opener = "2"
tauri-plugin-updater = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-shell = { path = "../../../crates/tauri-shell" }
