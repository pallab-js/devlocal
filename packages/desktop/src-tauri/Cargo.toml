[package]
name = "devopslocal"
version = "0.2.0"
description = "DevOpsLocal — local-first DevOps desktop suite"
authors = ["DevOpsLocal Contributors"]
edition = "2021"

[lib]
name = "devopslocal_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-opener = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
bollard = { version = "0.18", features = ["ssl"] }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "macros", "migrate"] }
sysinfo = "0.33"
futures-util = "0.3"
thiserror = "2"
chrono = { version = "0.4", features = ["serde"] }
keyring = "3"
docker-ops = { path = "../../../crates/docker-ops" }
db = { path = "../../../crates/db" }
tauri-shell = { path = "../../../crates/tauri-shell" }
